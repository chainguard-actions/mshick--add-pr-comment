name: Test commit comment target with commit-sha input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          message: "Commit comment test message."
          comment-target: "commit"
          commit-sha: "abc1234567890abcdef1234567890abcdef12345"
          message-id: "test-commit-comment"
          repo-token: "fake-token-for-testing"
          repo-owner: "test-owner"
          repo-name: "test-repo"
      - name: Assert action ran with commit-sha and comment-target inputs
        run: |
          echo "comment-created: ${{ steps.action.outputs.comment-created }}"
          echo "comment-id: ${{ steps.action.outputs.comment-id }}"
          echo "PASS: action accepted commit-sha and comment-target inputs"
