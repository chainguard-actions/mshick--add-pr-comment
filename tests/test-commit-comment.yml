name: Test commit-sha and comment-target inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          message: "Comment on a specific commit."
          comment-target: "commit"
          commit-sha: "abc1234567890abcdef1234567890abcdef12345"
          message-id: "test-commit-comment"
          repo-token: "fake-token-for-testing"
      - name: Assert action ran
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          echo "PASS: action was invoked with commit-sha and comment-target inputs"
