name: Test commit comment with commit-sha input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          message: "Commit comment test"
          comment-target: "commit"
          commit-sha: "abc1234567890abcdef1234567890abcdef1234"
          message-id: "test-commit-comment"
          repo-token: "fake-token-for-testing"
          repo-owner: "test-owner"
          repo-name: "test-repo"
      - name: Assert action ran
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome=$OUTCOME)"
