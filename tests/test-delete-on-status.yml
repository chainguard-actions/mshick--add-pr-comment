name: Test delete-on-status, issue, proxy-url, and truncate-separator inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          message: "Test with delete-on-status and other inputs"
          delete-on-status: "failure"
          issue: "42"
          proxy-url: "http://proxy.example.com:8080"
          truncate-separator: "==="
          message-id: "test-delete-on-status"
          repo-token: "fake-token-for-testing"
          repo-owner: "test-owner"
          repo-name: "test-repo"
      - name: Assert action ran
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome=$OUTCOME)"
