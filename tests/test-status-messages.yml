name: Test status-based message inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          message-success: "The run was successful!"
          message-failure: "The run failed!"
          message-cancelled: "The run was cancelled!"
          message-skipped: "The run was skipped!"
          status: "success"
          message-id: "test-status-messages"
          repo-token: "fake-token-for-testing"
          repo-owner: "test-owner"
          repo-name: "test-repo"
      - name: Assert action ran with status message inputs
        run: |
          echo "comment-created: ${{ steps.action.outputs.comment-created }}"
          echo "PASS: action accepted message-success, message-failure, message-cancelled, message-skipped inputs"
