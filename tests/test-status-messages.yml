name: Test status-based message inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          message-success: "Build succeeded!"
          message-failure: "Build failed!"
          message-cancelled: "Build was cancelled!"
          message-skipped: "Build was skipped!"
          status: "success"
          message-id: "test-status-messages"
          allow-repeats: "true"
          repo-token: "fake-token-for-testing"
          issue: "1"
      - name: Assert action ran
        run: |
          echo "Action completed (may fail due to no real GitHub API)"
          echo "comment-created: ${{ steps.action.outputs.comment-created }}"
          echo "PASS"
