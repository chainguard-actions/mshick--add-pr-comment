name: Test attach-path and attach-text inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create attachment file
        run: |
          echo "Attachment content" > /tmp/test-attachment.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          message: "See attached file"
          attach-path: "/tmp/test-attachment.txt"
          attach-name: "test-attachments"
          attach-text: "Download the full report: %ARTIFACT_URL%"
          message-id: "test-attach-path"
          repo-token: "fake-token-for-testing"
          repo-owner: "test-owner"
          repo-name: "test-repo"
      - name: Assert action ran
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome=$OUTCOME)"
