name: Test basic message input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          message: "Hello from the test!"
          message-id: "test-basic-message"
          allow-repeats: "true"
          repo-token: "fake-token-for-testing"
          repo-owner: "test-owner"
          repo-name: "test-repo"
      - name: Assert action ran (may fail due to API, but inputs were accepted)
        run: |
          echo "comment-created: ${{ steps.action.outputs.comment-created }}"
          echo "comment-updated: ${{ steps.action.outputs.comment-updated }}"
          echo "comment-id: ${{ steps.action.outputs.comment-id }}"
          echo "PASS: action accepted inputs without crashing on input validation"
