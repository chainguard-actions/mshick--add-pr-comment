name: Test basic message input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          message: "Hello from test"
          message-id: "test-basic-message"
          allow-repeats: "true"
          refresh-message-position: "false"
          status: "success"
          message-success: "Run succeeded!"
          message-failure: "Run failed!"
          message-cancelled: "Run cancelled!"
          message-skipped: "Run skipped!"
          update-only: "false"
          preformatted: "false"
          truncate: "simple"
          comment-target: "pr"
          repo-owner: "test-owner"
          repo-name: "test-repo"
          repo-token: "fake-token-for-testing"
      - name: Assert action ran (may fail due to missing PR context)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action will fail because there's no real PR/token, but we verify it ran
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome=$OUTCOME)"
