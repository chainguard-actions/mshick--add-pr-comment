name: Test basic message input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          message: "Hello from the test!"
          message-id: "test-basic-message"
          allow-repeats: "true"
          status: "success"
          message-success: "Run succeeded!"
          message-failure: "Run failed!"
          message-cancelled: "Run was cancelled!"
          message-skipped: "Run was skipped!"
          repo-token: "fake-token-for-testing"
      - name: Assert action ran (may fail due to no real PR)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action will fail without a real PR/token, that is expected
          # We just verify it was invoked with the inputs
          echo "PASS: action was invoked with message and related inputs"
