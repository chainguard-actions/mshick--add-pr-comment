name: Test advanced options - find, replace, update-only, issue, proxy-url, delete-on-status
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          find: "old-text"
          replace: "new-text"
          update-only: "true"
          issue: "42"
          proxy-url: "http://proxy.example.com:8080"
          delete-on-status: "failure"
          message-id: "test-advanced-options"
          repo-token: "fake-token-for-testing"
          repo-owner: "test-owner"
          repo-name: "test-repo"
      - name: Assert action ran with advanced option inputs
        run: |
          echo "comment-created: ${{ steps.action.outputs.comment-created }}"
          echo "comment-updated: ${{ steps.action.outputs.comment-updated }}"
          echo "PASS: action accepted find, replace, update-only, issue, proxy-url, delete-on-status inputs"
