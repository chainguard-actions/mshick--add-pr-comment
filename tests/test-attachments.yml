name: Test attachment inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create attachment file
        run: |
          echo "attachment content" > /tmp/test-attachment.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          message: "See attached file"
          attach-path: "/tmp/test-attachment.txt"
          attach-text: "Download the full report: %ARTIFACT_URL%"
          update-only: "false"
          message-id: "test-attachments"
          allow-repeats: "true"
          repo-token: "fake-token-for-testing"
          issue: "1"
      - name: Assert action ran
        run: |
          echo "Action completed (may fail due to no real GitHub API)"
          echo "artifact-url: ${{ steps.action.outputs.artifact-url }}"
          echo "PASS"
