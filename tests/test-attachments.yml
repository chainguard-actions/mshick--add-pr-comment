name: Test attach-path and attach-text inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create attachment file
        run: |
          echo "Attachment content for testing." > /tmp/test-attachment.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          message: "See attached file for details."
          attach-path: "/tmp/test-attachment.txt"
          attach-name: "test-attachments"
          attach-text: "Download the full report: %ARTIFACT_URL%"
          message-id: "test-attachments"
          repo-token: "fake-token-for-testing"
          repo-owner: "test-owner"
          repo-name: "test-repo"
      - name: Assert action ran with attachment inputs
        run: |
          echo "comment-created: ${{ steps.action.outputs.comment-created }}"
          echo "artifact-url: ${{ steps.action.outputs.artifact-url }}"
          echo "PASS: action accepted attach-path, attach-name, and attach-text inputs"
