name: Test message-path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create message file
        run: |
          echo "This is a test message from a file." > /tmp/test-message.md
      - id: action
        uses: .
        continue-on-error: true
        with:
          message-path: "/tmp/test-message.md"
          preformatted: "true"
          update-only: "false"
          refresh-message-position: "true"
          truncate-separator: "---"
          message-id: "test-message-path"
          repo-token: "fake-token-for-testing"
      - name: Assert action ran
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          echo "PASS: action was invoked with message-path and related inputs"
